<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário Pai &amp; Mãe</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --pai: #4a4a5a;
    --mae: #2ecc8a;
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e8e6e0;
    --text: #1a1a2e;
    --text-muted: #9a9a9a;
    --red: #e05252;
    --shadow: 0 2px 20px rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px;
  }

  .container {
    width: 100%;
    max-width: 480px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .nav-btn {
    width: 40px; height: 40px;
    border: none;
    background: var(--surface);
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow);
    color: var(--text);
    flex-shrink: 0;
  }

  .month-title-btn {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    color: var(--text);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .month-title-btn .chevron {
    font-size: 13px;
    opacity: 0.4;
    font-family: 'DM Sans', sans-serif;
  }

  .legend {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    justify-content: center;
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--text-muted);
  }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }

  .calendar {
    background: var(--surface);
    border-radius: 20px;
    box-shadow: var(--shadow);
    overflow: hidden;
    user-select: none;
  }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .weekday {
    text-align: center;
    padding: 10px 4px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .grid { display: grid; grid-template-columns: repeat(7, 1fr); }

  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(40px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-40px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .grid.anim-right { animation: slideInRight 0.22s ease; }
  .grid.anim-left  { animation: slideInLeft  0.22s ease; }

  .day-cell {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 6px 4px 8px;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .day-cell:nth-child(7n) { border-right: none; }
  .day-cell.other-month   { background: #fafaf8; }
  .day-cell.has-holiday   { background: #fffbf0; cursor: pointer; }

  .day-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    margin-bottom: 2px;
  }

  .day-number {
    font-size: 13px; font-weight: 500;
    color: var(--text); text-align: center; line-height: 1;
  }
  .day-number.sunday { color: var(--red); }
  .day-number.faded  { color: var(--border); }
  .day-number.today  {
    background: var(--text); color: white;
    border-radius: 50%; width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
  }

  .holiday-flag { font-size: 10px; line-height: 1; }

  .tag {
    border-radius: 5px; padding: 3px 5px;
    font-size: 11px; font-weight: 600; text-align: center;
  }
  .tag.pai { background: var(--pai); color: #fff; }
  .tag.mae { background: var(--mae); color: #fff; }
  .tag.faded { opacity: 0.18; }

  /* Holiday banner */
  .holiday-banner {
    display: none;
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    background: #1a1a2e; color: white;
    font-size: 14px; font-weight: 500;
    padding: 12px 20px; border-radius: 12px;
    white-space: nowrap; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    gap: 8px; align-items: center;
  }
  .holiday-banner.visible {
    display: flex;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  .banner-close { margin-left: 8px; opacity: 0.6; cursor: pointer; font-size: 16px; }

  /* Picker */
  .picker-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .picker-overlay.open { display: flex; }

  .picker-sheet {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 48px;
    width: 100%; max-width: 480px;
    animation: sheetUp 0.25s ease;
  }
  @keyframes sheetUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .picker-top {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 20px;
  }
  .picker-top h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 20px; color: var(--text);
  }
  .picker-close-btn {
    width: 32px; height: 32px; border-radius: 50%;
    border: none; background: var(--bg);
    font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
  }

  .picker-year-row {
    display: flex; align-items: center;
    justify-content: center; gap: 20px; margin-bottom: 24px;
  }
  .year-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: none; background: var(--bg);
    font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text);
  }
  .picker-year-label {
    font-family: 'DM Serif Display', serif;
    font-size: 28px; color: var(--text);
    min-width: 80px; text-align: center;
  }

  .picker-months-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .picker-month-btn {
    padding: 12px 6px; border-radius: 12px;
    border: 2px solid transparent;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500;
    color: var(--text); cursor: pointer;
    text-align: center;
  }
  .picker-month-btn.active  { background: var(--text); color: white; border-color: var(--text); }
  .picker-month-btn.current { border-color: var(--mae); }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
    <button class="month-title-btn" onclick="openPicker()">
      <span id="monthTitleText"></span>
      <span class="chevron">&#9660;</span>
    </button>
    <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
  </div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--mae)"></div>
      <span>M&#227;e</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--pai)"></div>
      <span>Pai</span>
    </div>
  </div>

  <div class="calendar">
    <div class="weekdays">
      <div class="weekday">Dom</div>
      <div class="weekday">Seg</div>
      <div class="weekday">Ter</div>
      <div class="weekday">Qua</div>
      <div class="weekday">Qui</div>
      <div class="weekday">Sex</div>
      <div class="weekday">S&#225;b</div>
    </div>
    <div class="grid" id="calendarGrid"></div>
  </div>
</div>

<div class="holiday-banner" id="holidayBanner">
  <span>&#127477;&#127481;</span>
  <span id="holidayBannerText"></span>
  <span class="banner-close" onclick="closeBanner()">&#10005;</span>
</div>

<div class="picker-overlay" id="pickerOverlay" onclick="overlayClick(event)">
  <div class="picker-sheet">
    <div class="picker-top">
      <h2>Ir para</h2>
      <button class="picker-close-btn" onclick="closePicker()">&#10005;</button>
    </div>
    <div class="picker-year-row">
      <button class="year-btn" onclick="pickerChangeYear(-1)">&#8249;</button>
      <div class="picker-year-label" id="pickerYearLabel"></div>
      <button class="year-btn" onclick="pickerChangeYear(1)">&#8250;</button>
    </div>
    <div class="picker-months-grid" id="pickerMonthsGrid"></div>
  </div>
</div>

<script>
var REFERENCE_DATE = new Date(2026, 3, 26);

var CYCLE = [
  ['mae'],       // 0: Dom alternado (só Mãe)
  ['mae','pai'], // 1
  ['pai'],       // 2
  ['pai','mae'], // 3
  ['mae'],       // 4
  ['mae','pai'], // 5
  ['pai'],       // 6
  ['pai'],       // 7
  ['pai','mae'], // 8
  ['mae'],       // 9
  ['mae','pai'], // 10
  ['pai'],       // 11
  ['pai','mae'], // 12
  ['mae']        // 13
];

function getTagsForDate(date) {
  var msDay = 86400000;
  var refMs = REFERENCE_DATE.getTime();
  var dateMs = new Date(date.getFullYear(), date.getMonth(), date.getDate()).getTime();
  var diff = Math.round((dateMs - refMs) / msDay);
  var idx = ((diff % 14) + 14) % 14;
  return CYCLE[idx];
}

var FIXED_HOLIDAYS = {
  '1-1':   'Ano Novo',
  '4-25':  'Dia da Liberdade',
  '5-1':   'Dia do Trabalhador',
  '6-10':  'Dia de Portugal',
  '8-15':  'Assun\u00e7\u00e3o de Nossa Senhora',
  '10-5':  'Implanta\u00e7\u00e3o da Rep\u00fablica',
  '11-1':  'Dia de Todos os Santos',
  '12-1':  'Restaura\u00e7\u00e3o da Independ\u00eancia',
  '12-8':  'Imaculada Concei\u00e7\u00e3o',
  '12-25': 'Natal'
};

function getEaster(year) {
  var a=year%19, b=Math.floor(year/100), c=year%100;
  var d=Math.floor(b/4), e=b%4, f=Math.floor((b+8)/25);
  var g=Math.floor((b-f+1)/3);
  var h=(19*a+b-d-g+15)%30;
  var i=Math.floor(c/4), k=c%4;
  var l=(32+2*e+2*i-h-k)%7;
  var m=Math.floor((a+11*h+22*l)/451);
  var mo=Math.floor((h+l-7*m+114)/31);
  var dy=((h+l-7*m+114)%31)+1;
  return new Date(year, mo-1, dy);
}

function getHolidayName(date) {
  var key = (date.getMonth()+1) + '-' + date.getDate();
  if (FIXED_HOLIDAYS[key]) return FIXED_HOLIDAYS[key];
  var easter = getEaster(date.getFullYear());
  var gf = new Date(easter); gf.setDate(easter.getDate()-2);
  var cc = new Date(easter); cc.setDate(easter.getDate()+60);
  var mobile = [
    { d: gf, name: 'Sexta-feira Santa' },
    { d: easter, name: 'P\u00e1scoa' },
    { d: cc, name: 'Corpo de Deus' }
  ];
  for (var i=0; i<mobile.length; i++) {
    if (mobile[i].d.getMonth()===date.getMonth() && mobile[i].d.getDate()===date.getDate())
      return mobile[i].name;
  }
  return null;
}

var MONTHS_PT = ['Janeiro','Fevereiro','Mar\u00e7o','Abril','Maio','Junho',
                 'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

var currentYear, currentMonth, slideDir = null;

function init() {
  var now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  render();
}

function changeMonth(delta) {
  slideDir = delta > 0 ? 'right' : 'left';
  currentMonth += delta;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  render();
}

function render() {
  document.getElementById('monthTitleText').textContent =
    MONTHS_PT[currentMonth] + ' ' + currentYear;

  var grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';
  grid.className = 'grid';
  if (slideDir === 'right') grid.className += ' anim-right';
  else if (slideDir === 'left') grid.className += ' anim-left';
  slideDir = null;

  var today = new Date();
  var firstDay = new Date(currentYear, currentMonth, 1).getDay();
  var daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
  var daysInPrev  = new Date(currentYear, currentMonth, 0).getDate();

  for (var i=firstDay-1; i>=0; i--) {
    var d = daysInPrev - i;
    grid.appendChild(makeCell(d, new Date(currentYear, currentMonth-1, d), true, false));
  }
  for (var d=1; d<=daysInMonth; d++) {
    var date = new Date(currentYear, currentMonth, d);
    var isToday = d===today.getDate() && currentMonth===today.getMonth() && currentYear===today.getFullYear();
    grid.appendChild(makeCell(d, date, false, isToday));
  }
  var total = firstDay + daysInMonth;
  var rem = (7 - (total % 7)) % 7;
  for (var d=1; d<=rem; d++) {
    grid.appendChild(makeCell(d, new Date(currentYear, currentMonth+1, d), true, false));
  }
}

function makeCell(dayNum, date, isOther, isToday) {
  var cell = document.createElement('div');
  cell.className = 'day-cell' + (isOther ? ' other-month' : '');

  var hName = isOther ? null : getHolidayName(date);
  if (hName) {
    cell.className += ' has-holiday';
    (function(name) {
      cell.addEventListener('click', function() { showBanner(name); });
    })(hName);
  }

  var header = document.createElement('div');
  header.className = 'day-header';

  var num = document.createElement('div');
  var isSun = date.getDay() === 0;
  num.className = 'day-number' +
    (isSun ? ' sunday' : '') +
    (isOther ? ' faded' : '') +
    (isToday ? ' today' : '');
  num.textContent = dayNum;
  header.appendChild(num);

  if (hName) {
    var flag = document.createElement('span');
    flag.className = 'holiday-flag';
    flag.textContent = '\uD83C\uDDF5\uD83C\uDDF9';
    header.appendChild(flag);
  }

  cell.appendChild(header);

  var tags = getTagsForDate(date);
  for (var i=0; i<tags.length; i++) {
    var t = document.createElement('div');
    t.className = 'tag ' + tags[i] + (isOther ? ' faded' : '');
    t.textContent = tags[i] === 'pai' ? 'Pai' : 'M\u00e3e';
    cell.appendChild(t);
  }

  return cell;
}

var bannerTimer = null;

function showBanner(name) {
  clearTimeout(bannerTimer);
  document.getElementById('holidayBannerText').textContent = name;
  document.getElementById('holidayBanner').className = 'holiday-banner visible';
  bannerTimer = setTimeout(closeBanner, 4000);
}

function closeBanner() {
  clearTimeout(bannerTimer);
  document.getElementById('holidayBanner').className = 'holiday-banner';
}

var pickerYear;

function openPicker() {
  pickerYear = currentYear;
  renderPicker();
  document.getElementById('pickerOverlay').className = 'picker-overlay open';
}

function closePicker() {
  document.getElementById('pickerOverlay').className = 'picker-overlay';
}

function overlayClick(e) {
  if (e.target === document.getElementById('pickerOverlay')) closePicker();
}

function pickerChangeYear(delta) {
  pickerYear += delta;
  renderPicker();
}

function renderPicker() {
  document.getElementById('pickerYearLabel').textContent = pickerYear;
  var grid = document.getElementById('pickerMonthsGrid');
  grid.innerHTML = '';
  var today = new Date();
  for (var idx=0; idx<MONTHS_PT.length; idx++) {
    (function(i) {
      var btn = document.createElement('button');
      btn.className = 'picker-month-btn';
      btn.textContent = MONTHS_PT[i].substring(0,3);
      if (i===currentMonth && pickerYear===currentYear) btn.className += ' active';
      if (i===today.getMonth() && pickerYear===today.getFullYear()) btn.className += ' current';
      btn.addEventListener('click', function() {
        var delta = (pickerYear - currentYear)*12 + (i - currentMonth);
        slideDir = delta >= 0 ? 'right' : 'left';
        currentYear = pickerYear;
        currentMonth = i;
        render();
        closePicker();
      });
      grid.appendChild(btn);
    })(idx);
  }
}

// Swipe iOS Safari
(function() {
  var cal = document.querySelector('.calendar');
  var startX = 0, startY = 0, tracking = false;
  var THRESHOLD = 40;

  cal.addEventListener('touchstart', function(e) {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    tracking = true;
  }, { passive: true });

  cal.addEventListener('touchend', function(e) {
    if (!tracking) return;
    tracking = false;
    var dx = e.changedTouches[0].clientX - startX;
    var dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > THRESHOLD) {
      changeMonth(dx < 0 ? 1 : -1);
    }
  }, { passive: true });

  cal.addEventListener('touchcancel', function() {
    tracking = false;
  }, { passive: true });
})();

init();
</script>
</body>
</html>
